l:"Qualité de Fabrication",value:"A++ Premium Prosumer"},{label:"Capacité",value:"30ml"},{label:"Certifications",value:"ISO9001 / MSDS"},{label:"Ingrédient Principal",value:"Nanotechnologie avancée de la céramique de graphène"}],featuresList:["Dureté Réelle 10H certifiée","Durée de vie exceptionnelle de 3 à 5 ans","Finition extrêmement brillante & profonde","Résistance chimique et acide avancée","Protection supérieure contre l'oxydation et la corrosion","Résistance maximale aux intempéries et aux rayons UV","Propriétés auto-nettoyantes nécessitant peu d'entretien","Puissant effet anti-poussière et rejet de la saleté"],labExperimentTitle:"Angle de contact avec l'eau de 120° (Test Réel)",labExperimentDesc:"Comparé aux revêtements traditionnels, il offre à votre carrosserie des niveaux de protection et de brillance sans précédent. Exploitant la puissance de la nanotechnologie avancée de la céramique de graphène, il crée une première couche de défense robuste et durable contre les agressions les plus extrêmes. Il scelle instantanément les imperfections microscopiques et les pores de votre peinture pour obtenir une surface lisse, vitreuse et ultra-glissante qui repousse l'eau et les contaminants. Cela aide à prévenir les taches de calcaire et à minimiser l'entretien à long terme. Nos tests rigoureux en laboratoire ont démontré qu'après plus de 400 à 600 lavages complets, le film protecteur conserve parfaitement ses propriétés hydrophobes actives."},{id:"graphene-ultra",title:"GRAPHENE ULTRA 10H",subtitle:"PROTECTION LONGUE DURÉE SANS COMPROMIS",specs:["Durée de vie de 5 ans+","Effet super hydrophobe unique","Haute résistance aux rayures","Brillance extrême et profonde","Finition céramique scellée"],table:{quality:"A+++",capacity:"30ml",mainIngredient:"Graphène Moléculaire",benefits:"Anti-taches & Super Glisse",protectionDetail:"Haute durabilité 5 ans+",effect:"Finition miroir luxueuse"},contactAngle:"125°",washesTested:"1000+",accentColor:"blue",boxAccentHex:"#3b82f6",price:89,introTitle:"Revêtement Céramique Graphene Ultra - Notre formule monocouche la plus avancée",checklist:["Il s'agit de notre revêtement monocouche le plus récent, extrêmement hydrophobe et ultra durable.","Des particules nano-bioniques condensées dotées de capacités de réticulation supérieures offrent une structure 3D robuste.","Crée un revêtement flexible à haute brillance avec un super pouvoir hydrofuge exceptionnel.","Offre un effet de perlage extrême où l'eau glisse et s'écoule instantanément de la carrosserie.","Garantit un brillant luxueux digne des salons de prestige et redonne à votre voiture un aspect neuf permanent.","Dureté 10H certifiée protégeant activement votre voiture des rayures et micro-rayures quotidiennes."],technicalSpecs:[{label:"Nom du produit",value:"Graphène Ultra 10H"},{label:"Qualité de Fabrication",value:"A+++ Élite Professionnelle"},{label:"Capacité",value:"30ml"},{label:"Certifications",value:"ISO9001 / MSDS (Formule Polysiloxane active)"},{label:"Tolérance pH",value:"pH 1-12 (Résistance totale aux acides & bases)"},{label:"Résistance Thermique",value:"Jusqu'à 760°C"},{label:"Épaisseur du revêtement",value:"Environ 30 ml de pure couche protectrice"}],featuresList:["Durabilité extrême de plus de 5 ans (lavages normaux)","Super hydrophobie avancée (Angle de contact de 125°)","Brillance miroir luxueuse d'une profondeur exceptionnelle","Dureté 10H résistante aux rayures et frottements","Protection avancée contre l'oxydation, la corrosion et la chaleur","Filtre anti-UV et barrière contre les intempéries","Haute résistance aux taches d'eau et au calcaire"],labExperimentTitle:"Angle de contact avec l'eau de 125° (Test Réel)",labExperimentDesc:"Grâce à la structure atomique en nid d'abeille du graphène, la combinaison de composés inorganiques est plus parfaite et plus solide, offrant un effet perlant et une durabilité surprenants. Nous avons mesuré en laboratoire un angle de contact avec l'eau de 125°, une performance inégalée par la quasi-totalité des cires et revêtements classiques. De plus, le graphène étant la substance la plus résistante au monde, il garantit une tenue de plus de 5 ans en usage quotidien. Les tests réels en extérieur ont montré qu'après plus de 1 000 lavages de voiture successifs, la structure moléculaire conserve son intégrité et son pouvoir hydrophobe d'origine.",keyHighlights:["Haute transparence après cristallisation","Écoulement d'eau ultra-rapide (effet auto-séchant)","Finition miroir haute brillance","Super hydrophobe & anti-statique","Anti-rayures et résistance physique","Ignifuge et barrière thermique"]},{id:"diamond-shield",title:"DIAMOND SHIELD 12H",subtitle:"LA RÉFÉRENCE ABSOLUE POUR PEINTURES ET VINYLES",specs:["Dureté 12H Révolutionnaire","Barrière anti-contaminants totale","Optimisé pour Films & Vinyles","Effet super hydrophobe extrême"],table:{quality:"A+++++",protectionTime:"7 ans",mainIngredient:"Graphène Actif & Silice de quartz",benefits:"Anti-Tourbillons & Brillance Éternelle",protectionDetail:"Films vinyles (Brillants & Mats)",effect:"Finition ultra-glissante Premium"},contactAngle:"137°",washesTested:"POUR FILMS VINYLES (GLOSS & MAT)",accentColor:"indigo",boxAccentHex:"#6366f1",price:119,introTitle:"Diamond Shield 12H - Le summum de la technologie de revêtement de carrosserie",checklist:["Diamond Shield 12H est le résultat de notre recherche la plus avancée dans les revêtements de prestige.","Technologie brevetée de la série CARLAYER (Brevet en cours de dépôt mondial).","Formule professionnelle haut de gamme offrant le meilleur rapport de protection du marché.","Spécialement formulée pour les peintures classiques, les finitions mates et les films vinyles de toute texture.","Garantit une protection active à toute épreuve pouvant durer jusqu'à 7 ans.","Compense parfaitement le manque naturel d'imperméabilité et de brillance des films de covering (PPF/Vinyl)."],technicalSpecs:[{label:"Nom du produit",value:"Revêtement Céramique Diamond Shield 12H"},{label:"Qu /* Premium Header Custom CSS */
.velox-header-container {
    width: 100%;
    background: 
        radial-gradient(circle at 50% 40%, rgba(0, 110, 255, 0.18) 0%, rgba(0, 40, 90, 0.05) 50%, transparent 80%),
        linear-gradient(45deg, #111 25%, transparent 25%), 
        linear-gradient(-45deg, #111 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #111 75%),
        linear-gradient(-45deg, transparent 75%, #111 75%),
        linear-gradient(135deg, #15181c 50%, #0d0f12 50%);
    background-size: 100% 100%, 6px 6px, 6px 6px, 6px 6px, 6px 6px, 6px 6px;
    border-bottom: 2px solid rgba(0, 110, 255, 0.15);
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    padding: 25px 0 35px 0;
    position: relative;
    overflow: hidden;
}

.velox-header-container::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0, 180, 255, 0.2), transparent);
}

.nav-wrapper {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0 30px;
}

.nav-side {
    display: flex;
    list-style: none;
    gap: 40px;
    position: relative;
    align-items: center;
    align-self: flex-start;
    margin-top: 12px;
}

.nav-left {
    justify-content: flex-end;
    padding-right: 20px;
}

.nav-right {
    justify-content: flex-start;
    padding-left: 20px;
}

.nav-item {
    position: relative;
}

.nav-link {
    text-decoration: none;
    color: rgba(255, 255, 255, 0.65);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.8px;
    transition: all 0.3s ease;
    display: block;
    padding: 10px 0;
    text-transform: uppercase;
}

.nav-link.active, .nav-link:hover {
    color: #ffffff;
    text-shadow: 0 0 10px rgba(0, 210, 255, 0.6);
}

.nav-side::after {
    content: '';
    position: absolute;
    bottom: -5px;
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, rgba(0, 110, 255, 0) 0%, rgba(0, 150, 255, 0.4) 40%, rgba(0, 230, 255, 0.5) 80%, rgba(0, 110, 255, 0) 100%);
}

.nav-left::after { right: 20px; }
.nav-right::after { left: 20px; }

.nav-link.active::after {
    content: '';
    position: absolute;
    bottom: -6px;
    left: 50%;
    transform: translateX(-50%);
    width: 120%;
    height: 3px;
    background: #00d2ff;
    border-radius: 2px;
    box-shadow: 0 0 15px #00d2ff, 0 0 30px #00a2ff;
    z-index: 2;
}

.brand-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 5;
    padding: 0 15px;
}

.logo-emblem {
    width: 90px;
    height: 90px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 10px;
    cursor: pointer;
}

.logo-emblem img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter:
        drop-shadow(0px 0px 8px rgba(0, 140, 255, 0.7))
        drop-shadow(0px 0px 20px rgba(0, 100, 220, 0.4))
        drop-shadow(0px 2px 4px rgba(0, 0, 0, 0.8));
    transition: filter 0.35s ease, transform 0.35s ease;
    display: block;
}

.logo-emblem:hover img {
    filter:
        drop-shadow(0px 0px 14px rgba(0, 200, 255, 0.9))
        drop-shadow(0px 0px 30px rgba(0, 150, 255, 0.55))
        drop-shadow(0px 2px 4px rgba(0, 0, 0, 0.8));
    transform: scale(1.06);
}

.logo-emblem::before {
    display: none !important;
}

.logo-emblem::after {
    display: none !important;
}

.brand-name {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: 4px;
    text-transform: uppercase;
    background: linear-gradient(180deg, #ffffff 0%, #b0b5bc 45%, #60646d 55%, #dcdfe4 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0px 2px 3px rgba(0, 0, 0, 0.9));
    margin-bottom: 12px;
}

.slogan-container {
    width: 100%;
    text-align: center;
    margin-top: 15px;
}

.slogan-text {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #d1d5db;
    background: linear-gradient(180deg, #ffffff 30%, #a3a7af 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0px 2px 5px rgba(0, 0, 0, 0.95));
}

@media (max-width: 768px) {
    .velox-header-container { padding: 8px 0 10px 0 !important; }
    .nav-wrapper { grid-template-columns: 1fr; gap: 4px; padding: 0 15px; }
    .nav-side { justify-content: center !important; padding: 0 !important; gap: 16px; }
    .nav-side::after { display: none; }
    .brand-center { order: -1; }
    .logo-emblem { width: 56px !important; height: 56px !important; margin-bottom: 2px !important; }
    .slogan-container { margin-top: 2px !important; }
    .slogan-text { font-size: 11px !important; letter-spacing: 1px !important; padding: 0 15px; }
}

</style>

        0% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-15px);
        }
        100% {
          transform: translateY(0px);
        }
      }
      .floating-box {
        animation: float 4s ease-in-out infinite;
      }
      @keyframes pulseShadow {
        0% {
          transform: translate(-50%, 0) scale(0.85);
          opacity: 0.4;
          filter: blur(4px);
        }
        50% {
          transform: translate(-50%, 0) scale(1.15);
          opacity: 0.15;
          filter: blur(8px);
        }
        100% {
          transform: translate(-50%, 0) scale(0.85);
          opacity: 0.4;
          filter: blur(4px);
        }
      }
      .floating-shadow {
        animation: pulseShadow 4s ease-in-out infinite;
        transform-origin: center;
      }
    </style>
